name: WebKitBindings
description: Automatically generated Dart bindings for WebKit2GTK 4.1.
output: "../lib/src/webview/webkit_bindings.dart"

compiler-opts:
  - "-I/usr/include/webkitgtk-4.1"
  - "-I/usr/include/glib-2.0"
  - "-I/usr/lib/x86_64-linux-gnu/glib-2.0/include"
  - "-I/usr/include/gtk-3.0"
  - "-I/usr/include/pango-1.0"
  - "-I/usr/include/cairo"
  - "-I/usr/include/gdk-pixbuf-2.0"
  - "-I/usr/include/harfbuzz"
  - "-I/usr/include/libsoup-3.0"
  - "-I/usr/include/atk-1.0"

headers:
  entry-points:
    - "/usr/include/webkitgtk-4.1/webkit2/webkit2.h"
    - "/usr/include/gtk-3.0/gtk/gtk.h"
    # JS Handling အတွက် JavaScriptCore Header ကိုပါ ထည့်ပေးရပါမယ်
    - "/usr/include/webkitgtk-4.1/jsc/jsc.h"

functions:
  include:
    # 1. WebKit Core Functions
    - "webkit_web_view_new"
    - "webkit_web_view_load_uri"
    - "webkit_web_view_get_snapshot"
    - "webkit_web_view_get_snapshot_finish" # Snapshot ပြီးဆုံးကြောင်း ဖမ်းရန် လိုအပ်
    - "webkit_web_view_evaluate_javascript"
    - "webkit_web_view_evaluate_javascript_finish"
    - "webkit_javascript_result_get_js_value"
    - "jsc_value_to_string"
    - "webkit_javascript_result_unref" # 💡 Memory ရှင်းဖို့ ထပ်ဖြည့်ရပါမယ်
    - "g_free"
    - "webkit_web_view_new_with_user_content_manager"
    - 'webkit_user_content_manager_new'
    - 'webkit_user_content_manager_register_script_message_handler'

    # 2. GTK Window & Loop
    - "gtk_init"
    - "gtk_main"
    - "gtk_main_quit"
    - "gtk_window_new"
    - "gtk_container_add"
    - "gtk_widget_show_all"
    - "gtk_widget_destroy"
    - "gtk_window_set_title"
    - "gtk_window_set_default_size"
    - "g_main_context_default"
    - "g_main_context_iteration"
    - "g_main_context_invoke"
    - "g_idle_add"

    # 3. GLib Signalling & Async
    - "g_signal_connect_data"
    - "g_object_unref"

structs:
  include:
    - "WebKitWebView"
    - "GtkWidget"
    - "GtkWindow"
    - "GError"
    - "cairo_t"
    - "cairo_surface_t"
    - "GtkContainer"
    - "_GClosure"
    - "JSCValue" # JavaScript Result ကို ဖတ်ဖို့အတွက် မဖြစ်မနေလိုပါသည်
    - "GAsyncResult" # Async Callback (_finish functions) တွေမှာ သုံးဖို့ လိုပါသည်
    - "_GMainContext" # standard main context အတွက် လိုအပ်နိုင်ပါသည်
    - "WebKitJavascriptResult"

enums:
  include:
    - "WebKitSnapshotRegion"
    - "WebKitSnapshotOptions"
    - "GConnectFlags"
